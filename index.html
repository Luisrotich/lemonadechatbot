<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonade Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            
        </header>

        <!-- Chatbot Section -->
        <div class="chat-section">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <span class="chat-avatar">AI</span>
                        <div>
                             <h2>Lemonade AI</h2>
                            <p class="chat-status">Online • Ready to help!</p>
                        </div>
                        
                        
                    </div>
                    <button class="clear-chat-btn" id="clear-chat" title="Clear chat">
                        <span class="clear-icon">↺</span>
                    </button>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="message bot-message">
                        <div class="message-content">
                            <p>Hi there!  I'm lemonade !</p>
                            <span class="message-time">Just now</span>
                        </div>
                    </div>
                </div>

                <!-- Suggestion Buttons 
                <div class="suggestions">
                    <button class="suggestion-btn">What's on the menu?</button>
                    <button class="suggestion-btn">Do you have sugar-free options?</button>
                    <button class="suggestion-btn">Can I customize my drink?</button>
                </div>
-->
                <div class="input-area">
    <textarea id="chat-input" placeholder="Ask about lemonades..." rows="1"></textarea>
    <button id="send-button">Send</button>
</div>
            </div>
        </div>

        <!-- Main Content (placeholder) -->
        <div class="main-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
